<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Dice Multiply — demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
  :root{
    --sand:#f4d03f;--gold:#f39c12;--dark:#1a1a2e;--panel:rgba(0,0,0,.58);--ok:#4fd982;--bad:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Fredoka One","Trebuchet MS",Arial,sans-serif;color:#fff;background:#0a0a1a;overflow:hidden;width:100vw;height:100vh;user-select:none;}

  /* ── game layout (exact copy from builder) ── */
  .game{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;background:#111;}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;filter:saturate(1.05) contrast(1.02);}
  .overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.35),rgba(0,0,0,.15) 35%,rgba(0,0,0,.35));z-index:2;pointer-events:none;}
  .hud{position:absolute;top:13px;right:16px;z-index:50;background:var(--panel);border:2px solid var(--gold);border-radius:26px;padding:6px 16px;display:flex;align-items:center;gap:6px;font-size:19px;color:var(--sand);}
  .cspin{animation:cflip 3s linear infinite}
  @keyframes cflip{0%,45%{transform:rotateY(0)}50%,95%{transform:rotateY(180deg)}100%{transform:rotateY(360deg)}}
  .instruction{position:absolute;z-index:20;top:48px;left:46%;transform:translateX(-50%);background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:7px 14px;max-width:56%;text-align:center;font-size:16px;}
  .player-side{position:absolute;left:150px;bottom:-18px;z-index:8;display:flex;flex-direction:column;align-items:flex-start;pointer-events:none;}
  .p-frame{width:clamp(270px,27vw,480px);height:clamp(345px,39vw,630px);border:none;display:flex;align-items:flex-end;justify-content:center;font-size:210px;overflow:visible;position:relative;}
  .p-frame img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));}
  .izone{position:absolute;right:0;top:0;bottom:0;width:42%;z-index:5;}
  .right-lane{position:absolute;inset:0;width:100%;height:100%;z-index:12;}

  /* ── input styles ── */
  input.answer{background:rgba(255,255,255,.95);border:3px solid rgba(255,180,0,.8);border-radius:14px;outline:none;color:#1d1606;font-family:"Fredoka One",cursive;transition:border-color .15s;}
  input.answer:focus{border-color:#f7a500;box-shadow:0 0 0 4px rgba(247,165,0,.3);}
  input.answer.ok{background:#d4f7d4;border-color:#22c55e;}
  input.answer.bad{background:#ffd5d5;border-color:#ef4444;}

  /* ── animations ── */
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  @keyframes diceRoll{0%{transform:rotate(0) scale(1)}15%{transform:rotate(-25deg) scale(1.18)}35%{transform:rotate(22deg) scale(.9)}55%{transform:rotate(-18deg) scale(1.12)}75%{transform:rotate(12deg) scale(.95)}90%{transform:rotate(-6deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}
  @keyframes introPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes cpopAnim{0%{opacity:1;transform:translateY(0)}80%{opacity:1;transform:translateY(-54px)}100%{opacity:0;transform:translateY(-54px)}}

  /* ── demo controls overlay ── */
  .demo-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(0,0,0,.78);border-top:1px solid rgba(255,255,255,.1);padding:8px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:14px;}
  .demo-bar label{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.8);}
  .demo-bar input[type=number]{width:56px;padding:3px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-family:"Fredoka One",cursive;font-size:14px;text-align:center;}
  .demo-bar button{padding:6px 16px;border:none;border-radius:20px;cursor:pointer;background:linear-gradient(135deg,#ffcf66,#f3a93f);color:#1d1606;font-family:"Fredoka One",cursive;font-size:14px;box-shadow:0 3px 0 #9b6b21;}
  .demo-bar button:active{transform:translateY(2px);box-shadow:none;}
  .demo-bar .round-tag{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;color:#fff;font-size:14px;}
</style>
</head>
<body>
<div class="game" id="game">
  <img class="bg" id="bg" src="assets/backgrounds/jelly_bay_island1.PNG" alt="">
  <div class="overlay"></div>
  <div class="hud"><span class="cspin">🪙</span><span id="coinsLabel">0</span></div>
  <div class="instruction" id="instruction">Tap the dice to roll!</div>
  <div class="player-side">
    <div class="p-frame"><img src="assets/characters/elf_green.webp" alt=""></div>
  </div>
  <div class="izone" id="izone">
    <div class="right-lane" id="lane"></div>
  </div>
</div>

<!-- Demo controls -->
<div class="demo-bar">
  <label>✖ R1–3: <input type="number" id="mult1" value="3" min="1" max="20"></label>
  <label>✖ R4–5: <input type="number" id="mult2" value="7" min="1" max="20"></label>
  <button onclick="restart()">🔄 Restart</button>
  <div class="round-tag" id="roundTag">Round 1 / 5</div>
</div>

<script>
const state = { round: 0, coins: 0 };

function $(id){ return document.getElementById(id); }

function getMult(){
  const m1 = Number($('mult1').value) || 3;
  const m2 = Number($('mult2').value) || 7;
  return state.round < 3 ? m1 : m2;
}

function addCoins(n){
  state.coins += n;
  $('coinsLabel').textContent = state.coins;
}

function shake(el){
  el.style.animation = '';
  void el.offsetWidth;
  el.style.animation = 'shake .22s ease';
  setTimeout(() => el.style.animation = '', 250);
}

function markSuccess(){
  addCoins(2);
  setTimeout(() => {
    state.round = state.round < 4 ? state.round + 1 : 0;
    $('roundTag').textContent = 'Round ' + (state.round + 1) + ' / 5';
    $('instruction').textContent = state.round < 3
      ? 'Tap the dice to roll! (×' + (Number($('mult1').value)||3) + ')'
      : 'Harder now! (×' + (Number($('mult2').value)||7) + ')';
    render();
  }, 500);
}

function render(){
  const lane = $('lane');
  lane.innerHTML = '';

  const mult = getMult();
  let diceVal = null;
  let rolled = false;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;';

  const diceEl = document.createElement('div');
  diceEl.style.cssText = 'font-size:220px;cursor:pointer;user-select:none;line-height:1;filter:drop-shadow(0 8px 24px rgba(0,0,0,.5));position:relative;';
  diceEl.textContent = '🎲';
  diceEl.title = 'Tap to roll!';

  const promptEl = document.createElement('div');
  promptEl.style.cssText = 'font-size:72px;font-weight:700;color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.6);min-height:88px;text-align:center;letter-spacing:2px;';
  promptEl.textContent = '? × ' + mult + ' = ?';

  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'answer';
  input.style.cssText = 'width:160px;font-size:60px;text-align:center;padding:10px;border-radius:16px;';
  input.placeholder = '?';
  input.autocomplete = 'off';
  input.disabled = true;

  let _timer;
  function checkDice(){
    if(!rolled || input.disabled) return;
    const val = String(input.value).trim();
    if(!val) return;
    if(Number(val) === diceVal * mult){
      input.disabled = true;
      input.classList.add('ok');
      markSuccess();
    } else {
      input.value = '';
      shake(input);
      input.classList.add('bad');
      setTimeout(() => input.classList.remove('bad'), 350);
    }
  }

  input.addEventListener('change', checkDice);
  input.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); checkDice(); } });
  input.addEventListener('input', () => {
    clearTimeout(_timer);
    if(!String(input.value).trim()) return;
    _timer = setTimeout(checkDice, 1200);
  });

  diceEl.addEventListener('click', () => {
    if(rolled) return;
    rolled = true;
    diceVal = Math.floor(Math.random() * 6) + 1;
    diceEl.style.animation = 'diceRoll .7s ease-out forwards';
    diceEl.style.cursor = 'default';
    setTimeout(() => {
      diceEl.style.animation = '';
      const badge = document.createElement('div');
      badge.style.cssText = 'position:absolute;top:-18px;right:-18px;width:90px;height:90px;background:#ff4400;color:#fff;font-size:52px;font-weight:900;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.5);font-family:"Fredoka One",cursive;animation:introPop .3s cubic-bezier(.34,1.56,.64,1);';
      badge.textContent = String(diceVal);
      diceEl.appendChild(badge);
      promptEl.textContent = diceVal + ' × ' + mult + ' = ?';
      input.disabled = false;
      input.focus();
    }, 750);
  });

  wrap.appendChild(diceEl);
  wrap.appendChild(promptEl);
  wrap.appendChild(input);
  lane.appendChild(wrap);
}

function restart(){
  state.round = 0;
  $('roundTag').textContent = 'Round 1 / 5';
  $('instruction').textContent = 'Tap the dice to roll!';
  render();
}

render();
</script>
</body>
</html>
